name: Build Unsigned IPA v2

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        working-directory: ios/CodexRemote
        run: |
          chmod +x scripts/build-unsigned-ipa.sh
          scripts/build-unsigned-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodexRemoteV2-unsigned-ipa
          path: ios/CodexRemote/build/CodexRemote-unsigned.ipa
